<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Measurement Mirror — Physical Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f4f0;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 0.06em;
    margin-bottom: 28px;
  }
  svg { max-width: 100%; }
  .legend {
    margin-top: 24px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.04em;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<h1>Measurement Mirror — Physical Setup</h1>
<p class="subtitle">MacBook Air M3 · MediaPipe Pose · Body Landmark Estimation</p>

<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Room floor gradient -->
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd8ce"/>
      <stop offset="100%" stop-color="#c9c3b8"/>
    </linearGradient>
    <!-- Wall gradient -->
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eae8e2"/>
      <stop offset="100%" stop-color="#dedad2"/>
    </linearGradient>
    <!-- Skin tone -->
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c9a0"/>
      <stop offset="100%" stop-color="#e8a878"/>
    </linearGradient>
    <!-- MacBook body -->
    <linearGradient id="mbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0cfc9"/>
      <stop offset="100%" stop-color="#b8b6b0"/>
    </linearGradient>
    <!-- Screen glow -->
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1a2a"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b8db8"/>
    </marker>
    <marker id="arrowBlueL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#5b8db8"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arrowRedL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowGreenL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowOrangeL" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#e67e22"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="calloutShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── ROOM ── -->
  <!-- Wall -->
  <rect x="0" y="0" width="900" height="480" fill="url(#wallGrad)"/>
  <!-- Floor -->
  <rect x="0" y="480" width="900" height="140" fill="url(#floorGrad)"/>
  <!-- Wall/floor edge line -->
  <line x1="0" y1="480" x2="900" y2="480" stroke="#bbb" stroke-width="1.5"/>
  <!-- Subtle wall panel lines -->
  <line x1="0" y1="80" x2="900" y2="80" stroke="#d8d5cf" stroke-width="0.8" stroke-dasharray="4,8"/>
  <!-- Window suggestion (light source) on left wall -->
  <rect x="0" y="100" width="22" height="200" fill="#e8f4ff" opacity="0.6"/>
  <line x1="22" y1="100" x2="22" y2="300" stroke="#cce0f0" stroke-width="1"/>
  <!-- Window glow on floor -->
  <ellipse cx="80" cy="485" rx="70" ry="10" fill="#e8f0f8" opacity="0.5"/>

  <!-- ── BOOKS STACK (MacBook stand) ── -->
  <!-- Stack of 3 books -->
  <rect x="148" y="400" width="100" height="14" rx="2" fill="#8B6F47" filter="url(#shadow)"/>
  <rect x="148" y="388" width="100" height="14" rx="2" fill="#6B8E5A"/>
  <rect x="150" y="376" width="96" height="14" rx="2" fill="#5B7FA8"/>
  <!-- Table surface (thin) -->
  <rect x="100" y="418" width="200" height="8" rx="3" fill="#c8b89a" filter="url(#shadow)"/>
  <!-- Table legs suggestion -->
  <rect x="110" y="426" width="8" height="54" rx="2" fill="#b8a88a"/>
  <rect x="282" y="426" width="8" height="54" rx="2" fill="#b8a88a"/>

  <!-- ── MACBOOK AIR ── -->
  <!-- Base / keyboard -->
  <rect x="130" y="350" width="130" height="28" rx="4" fill="url(#mbGrad)" filter="url(#shadow)"/>
  <!-- Keyboard keys suggestion -->
  <rect x="138" y="355" width="114" height="16" rx="2" fill="#c0beba"/>
  <!-- Lid / screen - slightly angled open ~100deg -->
  <!-- Screen bezel -->
  <rect x="134" y="270" width="122" height="82" rx="5" fill="#2a2a2a" filter="url(#shadow)"/>
  <!-- Screen display -->
  <rect x="139" y="275" width="112" height="72" rx="3" fill="url(#screenGrad)"/>
  <!-- Screen content: mini mirror view -->
  <!-- Person silhouette on screen (mirrored) -->
  <ellipse cx="195" cy="285" rx="7" ry="8" fill="#f5c9a0" opacity="0.9"/>
  <rect x="188" y="292" width="14" height="28" rx="3" fill="#4a7ab5" opacity="0.9"/>
  <line x1="188" y1="296" x2="179" y2="310" stroke="#4a7ab5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="202" y1="296" x2="211" y2="310" stroke="#4a7ab5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="191" y1="320" x2="187" y2="340" stroke="#4a7ab5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="199" y1="320" x2="203" y2="340" stroke="#4a7ab5" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- MediaPipe dots on screen person -->
  <circle cx="195" cy="283" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="188" cy="294" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="202" cy="294" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="179" cy="310" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="211" cy="310" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="190" cy="318" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="200" cy="318" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="187" cy="340" r="2" fill="#00ff88" opacity="0.9"/>
  <circle cx="203" cy="340" r="2" fill="#00ff88" opacity="0.9"/>
  <!-- Measurement lines on screen -->
  <line x1="184" y1="293" x2="206" y2="293" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="2,1" opacity="0.8"/>
  <line x1="187" y1="317" x2="203" y2="317" stroke="#ffd166" stroke-width="1" stroke-dasharray="2,1" opacity="0.8"/>
  <!-- Screen label -->
  <text x="195" y="348" text-anchor="middle" font-size="7" fill="#aaa" font-family="monospace">Mirror View</text>
  <!-- Camera dot -->
  <circle cx="195" cy="273" r="2.5" fill="#333"/>
  <circle cx="195" cy="273" r="1.2" fill="#111"/>

  <!-- Notch / Apple logo area -->
  <rect x="185" y="356" width="20" height="2" rx="1" fill="#aaa9a5"/>

  <!-- ── CAMERA CALLOUT ── -->
  <line x1="195" y1="271" x2="155" y2="248" stroke="#5b8db8" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="52" y="232" width="104" height="26" rx="4" fill="white" filter="url(#calloutShadow)" opacity="0.95"/>
  <text x="104" y="244" text-anchor="middle" font-size="9.5" fill="#2c5f8a" font-family="Georgia,serif" font-weight="bold">FaceTime HD Camera</text>
  <text x="104" y="254" text-anchor="middle" font-size="8.5" fill="#5b8db8" font-family="Georgia,serif">1080p · Built-in</text>

  <!-- Camera height annotation -->
  <!-- Vertical dashed line from camera to floor -->
  <line x1="130" y1="273" x2="130" y2="480" stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="273" x2="140" y2="273" stroke="#888" stroke-width="1"/>
  <line x1="120" y1="480" x2="140" y2="480" stroke="#888" stroke-width="1"/>
  <!-- Arrow up -->
  <line x1="127" y1="380" x2="127" y2="280" stroke="#888" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="127" y1="380" x2="127" y2="475" stroke="#888" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <rect x="60" y="370" width="60" height="22" rx="3" fill="white" opacity="0.9" filter="url(#calloutShadow)"/>
  <text x="90" y="381" text-anchor="middle" font-size="8.5" fill="#555" font-family="Georgia,serif">~4 ft high</text>
  <text x="90" y="390" text-anchor="middle" font-size="8" fill="#888" font-family="Georgia,serif">(chest height)</text>

  <!-- ── PERSON ── -->
  <!-- Shadow on floor -->
  <ellipse cx="600" cy="483" rx="38" ry="8" fill="#bbb" opacity="0.4"/>

  <!-- Body: legs -->
  <!-- Left leg -->
  <rect x="575" y="390" width="22" height="90" rx="10" fill="#4a6fa5"/>
  <!-- Right leg -->
  <rect x="603" y="390" width="22" height="90" rx="10" fill="#4a6fa5"/>
  <!-- Feet -->
  <ellipse cx="586" cy="482" rx="13" ry="6" fill="#3d3530"/>
  <ellipse cx="614" cy="482" rx="13" ry="6" fill="#3d3530"/>

  <!-- Body: torso -->
  <rect x="566" y="275" width="68" height="120" rx="14" fill="#4a6fa5" filter="url(#shadow)"/>

  <!-- Body: arms -->
  <!-- Left arm -->
  <path d="M566,290 Q540,330 535,370" stroke="#4a6fa5" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M634,290 Q660,330 665,370" stroke="#4a6fa5" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <ellipse cx="534" cy="374" rx="10" ry="12" fill="#e8a878"/>
  <ellipse cx="666" cy="374" rx="10" ry="12" fill="#e8a878"/>

  <!-- Body: neck -->
  <rect x="591" y="255" width="18" height="26" rx="6" fill="#e8a878"/>

  <!-- Body: head -->
  <ellipse cx="600" cy="235" rx="32" ry="36" fill="url(#skinGrad)" filter="url(#shadow)"/>
  <!-- Hair -->
  <ellipse cx="600" cy="208" rx="32" ry="16" fill="#3d2b1a"/>
  <rect x="568" y="208" width="64" height="12" fill="#3d2b1a"/>
  <!-- Face features -->
  <ellipse cx="590" cy="232" rx="4" ry="5" fill="#fff" opacity="0.9"/>
  <ellipse cx="610" cy="232" rx="4" ry="5" fill="#fff" opacity="0.9"/>
  <circle cx="590" cy="233" r="2.5" fill="#4a3728"/>
  <circle cx="610" cy="233" r="2.5" fill="#4a3728"/>
  <path d="M590,246 Q600,252 610,246" stroke="#c07050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="600" cy="240" rx="3" ry="4" fill="#d4956a"/>

  <!-- ── MEDIAPIPE SKELETON OVERLAY ── -->
  <!-- Connections (green lines) -->
  <!-- Nose to shoulders -->
  <line x1="600" y1="240" x2="572" y2="283" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="600" y1="240" x2="628" y2="283" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Shoulder to shoulder -->
  <line x1="572" y1="283" x2="628" y2="283" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Shoulder to elbow -->
  <line x1="572" y1="283" x2="545" y2="330" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="628" y1="283" x2="655" y2="330" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Elbow to wrist -->
  <line x1="545" y1="330" x2="534" y2="370" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="655" y1="330" x2="666" y2="370" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Shoulder to hip -->
  <line x1="572" y1="283" x2="577" y2="390" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="628" y1="283" x2="623" y2="390" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Hip to hip -->
  <line x1="577" y1="390" x2="623" y2="390" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Hip to knee -->
  <line x1="577" y1="390" x2="576" y2="440" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="623" y1="390" x2="624" y2="440" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <!-- Knee to ankle -->
  <line x1="576" y1="440" x2="576" y2="478" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>
  <line x1="624" y1="440" x2="624" y2="478" stroke="#00cc66" stroke-width="1.8" opacity="0.85"/>

  <!-- Landmark dots -->
  <circle cx="600" cy="240" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- nose -->
  <circle cx="572" cy="283" r="6" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L shoulder -->
  <circle cx="628" cy="283" r="6" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R shoulder -->
  <circle cx="545" cy="330" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L elbow -->
  <circle cx="655" cy="330" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R elbow -->
  <circle cx="534" cy="370" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L wrist -->
  <circle cx="666" cy="370" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R wrist -->
  <circle cx="577" cy="390" r="6" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L hip -->
  <circle cx="623" cy="390" r="6" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R hip -->
  <circle cx="576" cy="440" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L knee -->
  <circle cx="624" cy="440" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R knee -->
  <circle cx="576" cy="478" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- L ankle -->
  <circle cx="624" cy="478" r="5" fill="#00ff88" stroke="white" stroke-width="1.5"/><!-- R ankle -->

  <!-- ── MEASUREMENT LINES ── -->
  <!-- Shoulder width -->
  <line x1="555" y1="268" x2="645" y2="268" stroke="#e74c3c" stroke-width="1.8"
        marker-start="url(#arrowRedL)" marker-end="url(#arrowRed)"/>
  <rect x="564" y="254" width="72" height="15" rx="3" fill="#e74c3c" opacity="0.12"/>
  <text x="600" y="264" text-anchor="middle" font-size="9.5" fill="#c0392b" font-family="Georgia,serif" font-weight="bold">Shoulder Width</text>

  <!-- Hip width -->
  <line x1="562" y1="408" x2="638" y2="408" stroke="#e67e22" stroke-width="1.8"
        marker-start="url(#arrowOrangeL)" marker-end="url(#arrowOrange)"/>
  <rect x="570" y="410" width="60" height="14" rx="3" fill="#e67e22" opacity="0.12"/>
  <text x="600" y="421" text-anchor="middle" font-size="9.5" fill="#d35400" font-family="Georgia,serif" font-weight="bold">Hip Width</text>

  <!-- Torso (vertical, right side) -->
  <line x1="648" y1="283" x2="648" y2="390" stroke="#27ae60" stroke-width="1.8"
        marker-start="url(#arrowGreenL)" marker-end="url(#arrowGreen)"/>
  <rect x="652" y="326" width="42" height="14" rx="3" fill="#27ae60" opacity="0.12"/>
  <text x="673" y="336" text-anchor="middle" font-size="9.5" fill="#1e8449" font-family="Georgia,serif" font-weight="bold">Torso</text>

  <!-- Inseam (vertical, left side) -->
  <line x1="552" y1="390" x2="552" y2="478" stroke="#8e44ad" stroke-width="1.8"
        marker-start="url(#arrowGreenL)" marker-end="url(#arrowGreen)"/>
  <rect x="515" y="428" width="34" height="14" rx="3" fill="#8e44ad" opacity="0.12"/>
  <text x="532" y="438" text-anchor="middle" font-size="9.5" fill="#6c3483" font-family="Georgia,serif" font-weight="bold">Inseam</text>

  <!-- ── DISTANCE ARROW (floor level) ── -->
  <!-- Main distance line -->
  <line x1="200" y1="540" x2="560" y2="540" stroke="#5b8db8" stroke-width="2"
        marker-start="url(#arrowBlueL)" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <!-- Label -->
  <rect x="330" y="528" width="80" height="20" rx="4" fill="white" opacity="0.92"/>
  <text x="370" y="542" text-anchor="middle" font-size="11" fill="#2c5f8a" font-family="Georgia,serif" font-weight="bold">6 – 8 ft</text>

  <!-- Vertical reference lines to floor -->
  <line x1="200" y1="418" x2="200" y2="545" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,4"/>
  <line x1="560" y1="488" x2="560" y2="545" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,4"/>

  <!-- ── CALLOUT BOXES ── -->
  <!-- Plain background callout -->
  <line x1="700" y1="150" x2="740" y2="180" stroke="#5b8db8" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="700" y="120" width="180" height="36" rx="5" fill="white" filter="url(#calloutShadow)" opacity="0.95"/>
  <text x="790" y="135" text-anchor="middle" font-size="10" fill="#2c5f8a" font-family="Georgia,serif" font-weight="bold">Plain Background</text>
  <text x="790" y="149" text-anchor="middle" font-size="9" fill="#666" font-family="Georgia,serif">Improves detection accuracy</text>

  <!-- Stand in center callout -->
  <line x1="600" y1="510" x2="600" y2="560" stroke="#5b8db8" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="510" y="558" width="180" height="22" rx="5" fill="white" filter="url(#calloutShadow)" opacity="0.95"/>
  <text x="600" y="573" text-anchor="middle" font-size="9.5" fill="#2c5f8a" font-family="Georgia,serif">Stand in center of frame · arms relaxed</text>

  <!-- Good lighting callout -->
  <rect x="0" y="560" width="200" height="36" rx="5" fill="white" filter="url(#calloutShadow)" opacity="0.95"/>
  <text x="100" y="575" text-anchor="middle" font-size="10" fill="#2c5f8a" font-family="Georgia,serif" font-weight="bold">💡 Good Lighting</text>
  <text x="100" y="589" text-anchor="middle" font-size="9" fill="#666" font-family="Georgia,serif">Face a window or diffused light</text>

  <!-- Title bar at top -->
  <rect x="0" y="0" width="900" height="44" fill="#2c3e50" opacity="0.92"/>
  <text x="450" y="17" text-anchor="middle" font-size="10" fill="#7fb3d3" font-family="monospace" letter-spacing="2">BODY MEASUREMENT MIRROR</text>
  <text x="450" y="34" text-anchor="middle" font-size="9" fill="#aac4d8" font-family="monospace" letter-spacing="1">MacBook Air M3  ·  MediaPipe Pose  ·  OpenCV</text>

  <!-- Screen inset label -->
  <text x="195" y="265" text-anchor="middle" font-size="8" fill="#777" font-family="Georgia,serif" font-style="italic">Live screen output</text>

</svg>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#00ff88;border:1.5px solid #fff;box-shadow:0 0 0 1px #ccc"></div> MediaPipe Landmarks</div>
  <div class="legend-item"><div class="dot" style="background:#e74c3c"></div> Shoulder Width</div>
  <div class="legend-item"><div class="dot" style="background:#e67e22"></div> Hip Width</div>
  <div class="legend-item"><div class="dot" style="background:#27ae60"></div> Torso Length</div>
  <div class="legend-item"><div class="dot" style="background:#8e44ad"></div> Inseam</div>
  <div class="legend-item"><div class="dot" style="background:#5b8db8"></div> Distance / Annotations</div>
</div>

</body>
</html>
